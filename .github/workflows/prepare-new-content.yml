name: prepare-new-content
on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build 
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [21.5.0]

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{secrets.TOKEN}}

      - name: Set up Git Config
        run: |
          git config --global user.email "ryu.axel@gmail.com"
          git config --global user.name "hansol"

      - name: Install dependency
        run: npm install 

      - name: Deploy
        run: npm run deploy
        env:
          GITHUB_ID: ${{ secrets.ID }}
          GITHUB_PASSWORD: ${{ secrets.TOKEN }}