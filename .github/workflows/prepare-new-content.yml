name: prepare-new-content
on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build 
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [21.5.0]

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{secrets.TOKEN}}

      - name: Deploy
        run: npm run deploy
        with:
          GITHUB_ID: ${{ secrets.ID }}
          GITHUB_PASSWORD: ${{ secrets.TOKEN }}